<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rbrands · Comunicação D2C</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4fa;
    --surface: #ffffff;
    --surface2: #e8eef8;
    --border: #d0daea;
    --text: #1a2235;
    --muted: #6a7a9a;
    --accent: #4669AF;
    --accent2: #3558a0;
    --accent-light: #93B4DE;
    --cat-orientacoes: #4669AF;
    --cat-resultados: #2a8a5a;
    --cat-alinhamentos: #7a5aaf;
    --cat-produto: #c87a2a;
    --cat-transportes: #2a8aaf;
    --cat-campanhas: #c84a7a;
    --cat-cupons: #af4669;
    --cat-grupos: #5a7aaf;
    --cat-dicas: #4aafa0;
    --cat-reclame: #c83a2a;
    --cat-sites: #2a5aaf;
    --cat-outros: #7a8aaa;
    --cat-melhorias: #5aaf6a;
    --cat-elogios: #e8a020;
    --cat-urgente: #c82a2a;
    --cat-agendas: #6a5aaf;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 60% at 90% -10%,rgba(70,105,175,0.12) 0%,transparent 55%),radial-gradient(ellipse 60% 80% at -10% 90%,rgba(147,180,222,0.08) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(70,105,175,0.03) 0%,transparent 70%);pointer-events:none;z-index:0}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:68px;box-shadow:0 2px 12px rgba(70,105,175,0.08)}
  .logo{display:flex;align-items:center;gap:14px}
  .logo img{height:32px;width:auto;object-fit:contain}
  .logo-text{display:flex;flex-direction:column;line-height:1;border-left:2px solid var(--accent-light);padding-left:12px}
  .logo-brand{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--accent);letter-spacing:0.02em}
  .logo-sub{font-size:0.6rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;margin-top:3px}
  .header-right{display:flex;align-items:center;gap:0.8rem}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:0.55rem 1.1rem;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.78rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;text-decoration:none}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(70,105,175,0.3)}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.5rem 0.9rem;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.76rem;cursor:pointer;transition:all .2s}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent-light)}

  /* HERO */
  .hero{position:relative;z-index:1;padding:3.5rem 2.5rem 2.5rem;max-width:1300px;margin:0 auto}
  .hero-label{font-size:0.67rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent-light);margin-bottom:0.7rem;font-weight:500}
  .hero-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,4vw,3rem);line-height:1.1;color:var(--text);max-width:600px}
  .hero-title em{font-style:italic;color:var(--accent)}
  .hero-date{margin-top:0.8rem;font-size:0.76rem;color:var(--muted)}

  /* QUICK LINKS */
  .quick-links{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1.5rem;display:flex;gap:0.7rem;flex-wrap:wrap}
  .quick-link{display:flex;align-items:center;gap:6px;padding:0.45rem 1rem;border-radius:8px;font-size:0.76rem;font-weight:500;text-decoration:none;transition:all .2s;border:1.5px solid}
  .quick-link-site{background:rgba(70,105,175,0.06);border-color:rgba(70,105,175,0.2);color:var(--accent)}
  .quick-link-site:hover{background:rgba(70,105,175,0.12);transform:translateY(-1px)}

  /* CONTROLS */
  .controls{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1.8rem}
  .search-row{display:flex;gap:0.7rem;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:220px}
  .search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted)}
  .search-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.68rem 1rem 0.68rem 2.5rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.86rem;outline:none;transition:border-color .2s;box-shadow:0 2px 6px rgba(70,105,175,0.04)}
  .search-input::placeholder{color:var(--muted)}
  .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(70,105,175,0.1)}
  .date-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.68rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;min-width:148px;cursor:pointer;transition:border-color .2s}
  .date-input:focus{border-color:var(--accent)}
  .date-input::-webkit-calendar-picker-indicator{cursor:pointer;opacity:0.5}

  .filter-tags{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.9rem}
  .tag{padding:0.35rem 0.85rem;border-radius:999px;font-size:0.72rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);transition:all .2s;background:var(--surface);color:var(--muted)}
  .tag:hover{color:var(--text);border-color:var(--accent-light);background:var(--surface2)}
  .tag.active{color:#fff;font-weight:600;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
  .tag[data-cat="todos"].active{background:var(--accent)}
  .tag[data-cat="orientacoes"].active{background:var(--cat-orientacoes)}
  .tag[data-cat="resultados"].active{background:var(--cat-resultados)}
  .tag[data-cat="alinhamentos"].active{background:var(--cat-alinhamentos)}
  .tag[data-cat="produto"].active{background:var(--cat-produto)}
  .tag[data-cat="transportes"].active{background:var(--cat-transportes)}
  .tag[data-cat="campanhas"].active{background:var(--cat-campanhas)}
  .tag[data-cat="cupons"].active{background:var(--cat-cupons)}
  .tag[data-cat="grupos"].active{background:var(--cat-grupos)}
  .tag[data-cat="dicas"].active{background:var(--cat-dicas)}
  .tag[data-cat="reclame"].active{background:var(--cat-reclame)}
  .tag[data-cat="sites"].active{background:var(--cat-sites)}
  .tag[data-cat="outros"].active{background:var(--cat-outros)}
  .tag[data-cat="melhorias"].active{background:var(--cat-melhorias)}
  .tag[data-cat="elogios"].active{background:var(--cat-elogios)}
  .tag[data-cat="urgente"].active{background:var(--cat-urgente)}
  .tag[data-cat="agendas"].active{background:var(--cat-agendas)}

  /* DIVIDER */
  .section-divider{max-width:1300px;margin:0 auto;padding:0 2.5rem;border-top:1px solid var(--border);padding-top:1.5rem;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem}
  .results-info{font-size:0.72rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
  .results-info span{color:var(--accent);font-weight:600}
  .sync-btn{background:transparent;border:none;color:var(--muted);font-size:0.72rem;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;transition:color .2s}
  .sync-btn:hover{color:var(--accent)}
  .sync-btn svg{width:13px;height:13px}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* GRID */
  .grid{max-width:1300px;margin:0 auto;padding:0 2.5rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.1rem;position:relative;z-index:1}

  /* CARD */
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative;animation:fadeUp .4s ease both;box-shadow:0 2px 8px rgba(70,105,175,0.05)}
  .card:hover{border-color:var(--accent-light);transform:translateY(-3px);box-shadow:0 12px 32px rgba(70,105,175,0.12)}
  .card.pinned{border-color:rgba(70,105,175,0.4)}
  .card.pinned::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light))}

  /* ELOGIOS CARD ESPECIAL */
  .card.elogio{border-color:rgba(232,160,32,0.4);background:linear-gradient(135deg,#fffdf5 0%,#fff8e8 100%)}
  .card.elogio:hover{border-color:rgba(232,160,32,0.7);box-shadow:0 12px 32px rgba(232,160,32,0.15)}
  .card.elogio::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e8a020,#f5c842,#e8a020)}
  .card.elogio::after{content:'⭐';position:absolute;top:10px;right:12px;font-size:1.1rem;animation:starPulse 2s ease-in-out infinite}
  @keyframes starPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.8}}

  .card-header{padding:1rem 1.2rem 0.6rem;display:flex;align-items:flex-start;justify-content:space-between;gap:0.8rem}
  .cat-pill{padding:0.22rem 0.65rem;border-radius:999px;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0}

  .pill-orientacoes{background:rgba(70,105,175,0.12);color:var(--cat-orientacoes)}
  .pill-resultados{background:rgba(42,138,90,0.12);color:var(--cat-resultados)}
  .pill-alinhamentos{background:rgba(122,90,175,0.12);color:var(--cat-alinhamentos)}
  .pill-produto{background:rgba(200,122,42,0.12);color:var(--cat-produto)}
  .pill-transportes{background:rgba(42,138,175,0.12);color:var(--cat-transportes)}
  .pill-campanhas{background:rgba(200,74,122,0.12);color:var(--cat-campanhas)}
  .pill-cupons{background:rgba(175,70,105,0.12);color:var(--cat-cupons)}
  .pill-grupos{background:rgba(90,122,175,0.12);color:var(--cat-grupos)}
  .pill-dicas{background:rgba(74,175,160,0.12);color:var(--cat-dicas)}
  .pill-reclame{background:rgba(200,58,42,0.12);color:var(--cat-reclame)}
  .pill-sites{background:rgba(42,90,175,0.12);color:var(--cat-sites)}
  .pill-outros{background:rgba(122,138,170,0.12);color:var(--cat-outros)}
  .pill-melhorias{background:rgba(90,175,106,0.12);color:var(--cat-melhorias)}
  .pill-elogios{background:rgba(232,160,32,0.15);color:#b87a10}
  .pill-urgente{background:rgba(200,42,42,0.12);color:var(--cat-urgente)}
  .pill-agendas{background:rgba(106,90,175,0.12);color:var(--cat-agendas)}
  .pill-default{background:rgba(70,105,175,0.08);color:var(--accent)}

  .card-body{padding:0 1.2rem 1rem}
  .card-title{font-family:'DM Serif Display',serif;font-size:1rem;line-height:1.3;color:var(--text);margin-bottom:0.5rem}
  .card-excerpt{font-size:0.79rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-footer{padding:0.8rem 1.2rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-meta{display:flex;align-items:center;gap:0.45rem}
  .avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.56rem;font-weight:700;color:#fff}
  .card-author{font-size:0.72rem;color:var(--muted)}
  .card-date{font-size:0.7rem;color:var(--muted)}

  /* EMPTY */
  .empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted)}
  .empty-icon{font-size:2.5rem;margin-bottom:0.8rem;opacity:0.4}
  .empty-text{font-size:0.86rem;line-height:1.7}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(26,34,53,0.5);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;max-width:680px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:0 24px 60px rgba(26,34,53,0.2)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-top{padding:1.8rem 1.8rem 1.3rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
  .modal-close{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:0.9rem}
  .modal-close:hover{color:var(--text);border-color:var(--accent-light)}
  .modal-cat{margin-bottom:0.7rem}
  .modal-title{font-family:'DM Serif Display',serif;font-size:1.5rem;line-height:1.25;color:var(--text)}
  .modal-body{padding:1.4rem 1.8rem 1.8rem}
  .modal-meta-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.3rem;padding-bottom:1.3rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .modal-author-row{display:flex;align-items:center;gap:0.5rem}
  .avatar-lg{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:#fff}
  .modal-author-name{font-size:0.83rem;color:var(--text)}
  .modal-date-full{font-size:0.77rem;color:var(--muted);margin-left:auto}
  .modal-content{font-size:0.91rem;line-height:1.85;color:#445}
  .modal-content p{margin-bottom:1rem}
  .modal-content strong{color:var(--text)}

  /* BANNER */
  .config-banner{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem}
  .banner{background:rgba(70,105,175,0.06);border:1px solid rgba(70,105,175,0.2);border-radius:10px;padding:0.9rem 1.2rem;display:flex;align-items:flex-start;gap:0.9rem;margin-bottom:1.3rem}
  .banner svg{flex-shrink:0;width:16px;height:16px;color:var(--accent);margin-top:2px}
  .banner-text{font-size:0.8rem;line-height:1.6;color:var(--accent)}
  .banner-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;flex-shrink:0}

  .logo-rbrands{height:28px;width:auto;object-fit:contain;filter:brightness(0.2)}
  .header-badge{font-size:0.65rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);background:rgba(70,105,175,0.1);padding:0.3rem 0.8rem;border-radius:999px;border:1px solid rgba(70,105,175,0.2)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px}

  @media(max-width:600px){
    header{padding:0 1rem}
    .hero,.controls,.section-divider,.config-banner,.quick-links{padding-left:1rem;padding-right:1rem}
    .grid{padding:0 1rem 3rem;grid-template-columns:1fr}
    .logo-sub{display:none}
  }
</style>
</head>

    <button class="tag" data-cat="grupos" onclick="setCategory('grupos',this)">👥 Grupos Especiais</button>
    <button class="tag" data-cat="dicas" onclick="setCategory('dicas',this)">💡 Dicas de Atendimento</button>
    <button class="tag" data-cat="melhorias" onclick="setCategory('melhorias',this)">⚙️ Melhorias</button>
    <button class="tag" data-cat="elogios" onclick="setCategory('elogios',this)">⭐ Elogios</button>
    <button class="tag" data-cat="agendas" onclick="setCategory('agendas',this)">📅 Nossas Agendas</button>
    <button class="tag" data-cat="outros" onclick="setCategory('outros',this)">📌 Outros</button>
  </div>
</div>

<!-- DIVIDER -->
<div class="section-divider">
  <p class="results-info">Exibindo <span id="count">0</span> publicações</p>
  <button class="sync-btn" onclick="loadPosts()">
    <svg id="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Atualizar
  </button>
</div>

<!-- GRID -->
<div class="grid" id="card-grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="read-overlay" onclick="closeRead(event)">
  <div class="modal">
    <div class="modal-top">
      <div><div class="modal-cat" id="modal-cat"></div><h2 class="modal-title" id="modal-title"></h2></div>
      <button class="modal-close" onclick="closeReadDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta-row">
        <div class="modal-author-row">
          <div class="avatar-lg" id="modal-avatar"></div>
          <span class="modal-author-name" id="modal-author"></span>
        </div>
        <span class="modal-date-full" id="modal-date"></span>
      </div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>
</div>

<script>
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const AVATAR_COLORS=['#4669AF','#2a8a5a','#7a5aaf','#c87a2a','#2a8aaf','#c84a7a','#e8a020','#c83a2a'];

const CAT_MAP = {
  'orientacoes':{'orientacoes e procedimentos':1,'orientações e procedimentos':1,'orientacao':1,'orientações':1,'orientacoes':1,'procedimentos':1},
  'resultados':{'nossos resultados':1,'resultados':1,'resultado':1},
  'alinhamentos':{'alinhamentos':1,'alinhamento':1},
  'produto':{'produto':1,'produtos':1},
  'transportes':{'transportes':1,'transporte':1,'entrega':1,'entregas':1,'frete':1},
  'campanhas':{'campanhas':1,'campanha':1},
  'cupons':{'cupons':1,'cupom':1,'cupon':1},
  'grupos':{'grupos especiais':1,'grupos':1,'grupo especial':1,'grupo':1},
  'dicas':{'dica de atendimentos':1,'dicas de atendimento':1,'dicas':1,'dica':1},
  'reclame':{'reclame aqui':1,'reclame':1},
  'melhorias':{'melhorias':1,'melhoria':1},
  'elogios':{'elogios':1,'elogio':1},
  'outros':{'outros':1,'outro':1,'geral':1},
  'urgente':{'urgente':1},
  'agendas':{'nossas agendas':1,'agendas':1,'agenda':1},
  'sistemas':{'sistemas':1,'sistema':1},
};

const CAT_CONFIG = {
  orientacoes: {label:'📋 Orientações',    cls:'pill-orientacoes'},
  resultados:  {label:'🏆 Resultados',     cls:'pill-resultados'},
  alinhamentos:{label:'🤝 Alinhamentos',   cls:'pill-alinhamentos'},
  produto:     {label:'🛍️ Produto',        cls:'pill-produto'},
  transportes: {label:'🚚 Transportes',    cls:'pill-transportes'},
  campanhas:   {label:'📣 Campanhas',      cls:'pill-campanhas'},
  cupons:      {label:'🎟️ Cupons',         cls:'pill-cupons'},
  grupos:      {label:'👥 Grupos Especiais',cls:'pill-grupos'},
  dicas:       {label:'💡 Dicas',          cls:'pill-dicas'},
  reclame:     {label:'🔴 Reclame Aqui',   cls:'pill-reclame'},
  melhorias:   {label:'⚙️ Melhorias',      cls:'pill-melhorias'},
  elogios:     {label:'⭐ Elogios',        cls:'pill-elogios'},
  outros:      {label:'📌 Outros',         cls:'pill-outros'},
  urgente:     {label:'🚨 Urgente',        cls:'pill-urgente'},
  agendas:     {label:'📅 Nossas Agendas', cls:'pill-agendas'},
  sistemas:    {label:'💻 Sistemas',       cls:'pill-outros'},
};

function normalizeCat(raw) {
  const n = (raw||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for (const [key, variants] of Object.entries(CAT_MAP)) {
    if (variants[n]) return key;
  }
  return 'outros';
}

function getCatConfig(cat) {
  return CAT_CONFIG[cat] || {label:'📌 '+cat, cls:'pill-default'};
}

// ── DEMO DATA ─────────────────────────────────────────────
const DEMO_POSTS = [
  {pinned:true, cat:'resultados', titulo:'CSAT semanal: 94% de satisfação!', resumo:'O time de pós-venda atingiu 94% de CSAT esta semana — melhor marca do trimestre!', conteudo:'<p><strong>Parabéns ao time!</strong> 94% de CSAT — melhor marca desde janeiro. TMA de 4h e FCR de 78%. 🎉</p>', autor:'Deia', data:'2025-03-10'},
  {pinned:false, cat:'elogios',   titulo:'Cliente elogiou atendimento da Ana!', resumo:'Cliente enviou mensagem elogiando a rapidez e empatia no atendimento. Orgulho do time!', conteudo:'<p>O cliente <strong>João Silva</strong> enviou mensagem elogiando o atendimento da Ana Beatriz: "Fui atendido com muita rapidez e atenção. Parabéns à equipe!"</p><p>Esse é o tipo de retorno que nos motiva todo dia! ⭐</p>', autor:'Deia', data:'2025-03-10'},
  {pinned:false, cat:'transportes', titulo:'Correios: atraso na região Sul até 14/03', resumo:'Pedidos despachados entre 5 e 9 de março podem atrasar até 3 dias úteis no RS e SC.', conteudo:'<p>Atraso nas unidades do <strong>RS e SC</strong>. Pedidos entre <strong>5 e 9 de março</strong>: até 3 dias de atraso. Informar proativamente.</p>', autor:'Ana Beatriz', data:'2025-03-09'},
  {pinned:false, cat:'campanhas', titulo:'Campanha Invictus Março: desconto progressivo ativo', resumo:'10% a 25% de desconto para compras acima de R$150. Cupons individuais não acumulam.', conteudo:'<p>Campanha ativa desde 08/03. Desconto de 10% a 25% para compras acima de R$150.</p><p>• Cupons NÃO acumulam<br>• Válida apenas para produtos sem promoção ativa</p>', autor:'Marcos', data:'2025-03-08'},
  {pinned:false, cat:'orientacoes', titulo:'Script atualizado: reclamações no WhatsApp v2.1', resumo:'Nova versão do script com abertura mais empática e fluxo específico por tipo de reclamação.', conteudo:'<p>Script <strong>v2.1</strong> disponível no SharePoint. Aplicar a partir de hoje.</p>', autor:'Juliana', data:'2025-03-06'},
];

let posts = [];
let activeCat = 'todos';

// ── INIT ──────────────────────────────────────────────────
const hn = document.getElementById('header-nome');
const hs = document.getElementById('header-sub');
if(hn) hn.textContent = NOME_PORTAL;
if(hs) hs.textContent = SUB_PORTAL;
const today = new Date();
document.getElementById('today-date').textContent = `${DAYS[today.getDay()]}, ${today.getDate()} de ${MONTHS[today.getMonth()]} de ${today.getFullYear()}`;

// ── DATE FORMAT ───────────────────────────────────────────
function formatISODate(val) {
  if (!val) return new Date().toISOString().split('T')[0];
  const s = String(val).trim();
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) return `${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;
  const meses={jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
  const ptm = s.toLowerCase().match(/^(\d{1,2})[\/\-]([a-z]{3})(?:[\/\-](\d{2,4}))?$/);
  if (ptm) return `${ptm[3]?(ptm[3].length===2?'20'+ptm[3]:ptm[3]):today.getFullYear()}-${String(meses[ptm[2]]||1).padStart(2,'0')}-${String(ptm[1]).padStart(2,'0')}`;
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (dmy) return `${dmy[3].length===2?'20'+dmy[3]:dmy[3]}-${String(dmy[2]).padStart(2,'0')}-${String(dmy[1]).padStart(2,'0')}`;
  try { return new Date(val).toISOString().split('T')[0]; } catch { return ''; }
}

const fmt = d => { if(!d)return''; const[y,m,day]=d.split('-'); return `${+day} ${['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][+m-1]} ${y}`; };
const fmtFull = d => { if(!d)return''; const[y,m,day]=d.split('-'); return `${+day} de ${MONTHS[+m-1]} de ${y}`; };
const ini = n => n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

// ── PARSE CSV ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  function splitLine(line) {
    const r=[];let cur='';let q=false;
    for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){q=!q}else if(c===','&&!q){r.push(cur.trim());cur=''}else{cur+=c}}
    r.push(cur.trim());return r;
  }
  const norm = s=>(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const headers = splitLine(lines[0]).map(h=>norm(h.replace(/^"|"$/g,'')));
  const gi = (...ls)=>{for(const l of ls){const i=headers.findIndex(h=>h===norm(l));if(i>=0)return i}return -1};
  const iData=gi('data');const iCat=gi('categoria');const iTit=gi('titulo','title','título');
  const iNot=gi('noticia','notícia','conteudo','conteúdo','texto','mensagem');
  const iRes=gi('resumo');const iAut=gi('autor','author');const iFix=gi('fixado','pin');
  return lines.slice(1).map((line,i)=>{
    const cols=splitLine(line).map(c=>c.replace(/^"|"$/g,'').trim());
    const get=idx=>idx>=0?(cols[idx]||''):'';
    const noticia=get(iNot);
    return{id:i,data:formatISODate(get(iData)),cat:normalizeCat(get(iCat)),titulo:get(iTit),
      resumo:get(iRes)||noticia.substring(0,160)+(noticia.length>160?'...':''),
      conteudo:noticia.replace(/\n/g,'<br>'),autor:get(iAut)||'Time',
      pinned:get(iFix).toLowerCase().trim()==='sim',_color:AVATAR_COLORS[i%AVATAR_COLORS.length]};
  }).filter(p=>p.titulo);
}

// ── LOAD ──────────────────────────────────────────────────
function loadPosts() {
  const icon = document.getElementById('sync-icon');
  icon.classList.add('spin');

  // Mostra demo imediatamente
  if (posts.length === 0) {
    posts = DEMO_POSTS.map((p,i) => ({...p, _color: AVATAR_COLORS[i % AVATAR_COLORS.length]}));
    render();
  }

  // Usa proxy para evitar bloqueio CORS do GitHub Pages
  const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(CSV_URL);
  fetch(proxyUrl)
    .then(r => r.json())
    .then(data => {
      const parsed = parseCSV(data.contents);
      icon.classList.remove('spin');
      const banner = document.getElementById('config-banner');
      if (parsed.length > 0) {
        posts = parsed;
        if (banner) banner.style.display = 'none';
      } else {
        if (banner) {
          const bt = banner.querySelector('.banner-text');
          if (bt) bt.textContent = 'Planilha conectada, mas sem publicações ainda. Adicione linhas na planilha!';
        }
      }
      render();
    })
    .catch(e => {
      console.warn('Erro ao buscar planilha:', e);
      icon.classList.remove('spin');
      render();
    });
}

// ── FILTERS ───────────────────────────────────────────────
function setCategory(cat,el){activeCat=cat;document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));el.classList.add('active');render()}
function clearFilters(){activeCat='todos';document.getElementById('search-input').value='';document.getElementById('date-input').value='';document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));document.querySelector('.tag[data-cat="todos"]').classList.add('active');render()}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const grid=document.getElementById('card-grid');
  const q=document.getElementById('search-input').value.toLowerCase();
  const dateVal=document.getElementById('date-input').value;
  let f=posts.filter(p=>{
    const mc=activeCat==='todos'||p.cat===activeCat;
    const md=!dateVal||p.data===dateVal;
    const ms=!q||[p.titulo,p.resumo,p.autor,p.conteudo].some(t=>String(t).toLowerCase().includes(q));
    return mc&&md&&ms;
  });
  f.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.data||'').localeCompare(a.data||''));
  document.getElementById('count').textContent=f.length;
  grid.innerHTML='';
  if(!f.length){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p class="empty-text">Nenhuma publicação encontrada.</p></div>';return}
  f.forEach((p,i)=>{
    const cfg=getCatConfig(p.cat);
    const col=p._color||AVATAR_COLORS[0];
    const isElogio=p.cat==='elogios';
    const card=document.createElement('div');
    card.className='card'+(p.pinned?' pinned':'')+(isElogio?' elogio':'');
    card.style.animationDelay=Math.min(i*.05,.4)+'s';
    card.onclick=()=>openRead(p,col);
    card.innerHTML=`
      <div class="card-header">
        <span class="cat-pill ${cfg.cls}">${cfg.label}</span>
        ${p.pinned&&!isElogio?'<span style="color:var(--accent);font-size:.85rem">📌</span>':''}
      </div>
      <div class="card-body">
        <h3 class="card-title">${p.titulo}</h3>
        <p class="card-excerpt">${p.resumo}</p>
      </div>
      <div class="card-footer">
        <div class="card-meta">
          <div class="avatar" style="background:${col}">${ini(p.autor)}</div>
          <span class="card-author">${p.autor}</span>
        </div>
        <span class="card-date">${fmt(p.data)}</span>
      </div>`;
    grid.appendChild(card);
  });
}

// ── MODAL ─────────────────────────────────────────────────
function openRead(p,col){
  const cfg=getCatConfig(p.cat);
  document.getElementById('modal-cat').innerHTML=`<span class="cat-pill ${cfg.cls}">${cfg.label}</span>`;
  document.getElementById('modal-title').textContent=p.titulo;
  document.getElementById('modal-avatar').style.background=col;
  document.getElementById('modal-avatar').textContent=ini(p.autor);
  document.getElementById('modal-author').textContent=p.autor;
  document.getElementById('modal-date').textContent=fmtFull(p.data);
  document.getElementById('modal-content').innerHTML=p.conteudo||'<p>Sem conteúdo.</p>';
  document.getElementById('read-overlay').classList.add('open');
}
function closeRead(e){if(e.target.id==='read-overlay')closeReadDirect()}
function closeReadDirect(){document.getElementById('read-overlay').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReadDirect()});

loadPosts();
</script>
</body>
