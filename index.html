<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rbrands · Comunicação D2C</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4fa;--surface:#fff;--surface2:#e8eef8;--border:#d0daea;--text:#1a2235;--muted:#6a7a9a;--accent:#4669AF;--accent2:#3558a0;--accent-light:#93B4DE;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 12px rgba(70,105,175,0.08)}
.logo{display:flex;align-items:center;gap:12px}
.logo-text{font-weight:700;font-size:1.05rem;color:var(--accent);letter-spacing:0.04em}
.logo-divider{width:1px;height:24px;background:var(--border);margin:0 4px}
.logo-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.header-right{display:flex;align-items:center;gap:0.8rem}
.notif-wrap{position:relative;cursor:pointer}
.notif-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.85rem}
.notif-count{position:absolute;top:-5px;right:-5px;background:#c82a2a;color:#fff;font-size:0.5rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.notif-count.hidden{display:none}
.badge{font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:rgba(70,105,175,0.1);padding:0.3rem 0.8rem;border-radius:999px;border:1px solid rgba(70,105,175,0.2)}
.notif-banner{max-width:1300px;margin:0.8rem auto 0;padding:0 2rem}
.notif-inner{background:rgba(70,105,175,0.06);border:1px solid rgba(70,105,175,0.2);border-radius:10px;padding:0.8rem 1.1rem;display:flex;align-items:center;gap:0.8rem;font-size:0.79rem;color:var(--accent);cursor:pointer}
.notif-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem}
.hero{padding:2rem 2rem 1.2rem;max-width:1300px;margin:0 auto}
.hero-label{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-light);margin-bottom:0.6rem;font-weight:500}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);line-height:1.1;color:var(--text)}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-date{margin-top:0.6rem;font-size:0.75rem;color:var(--muted)}
.links{max-width:1300px;margin:0 auto;padding:0 2rem 1.2rem;display:flex;gap:0.6rem;flex-wrap:wrap}
.link-btn{display:flex;align-items:center;gap:6px;padding:0.4rem 0.9rem;border-radius:8px;font-size:0.74rem;font-weight:500;text-decoration:none;transition:all .2s;border:1.5px solid rgba(70,105,175,0.2);background:rgba(70,105,175,0.06);color:var(--accent)}
.link-btn:hover{background:rgba(70,105,175,0.12);transform:translateY(-1px)}
.controls{max-width:1300px;margin:0 auto;padding:0 2rem 1rem}
.search-row{display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted)}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.65rem 1rem 0.65rem 2.4rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.date-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.65rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;min-width:145px}
.date-input:focus{border-color:var(--accent)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:0.6rem 1rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.76rem;cursor:pointer;transition:all .2s}
.btn-ghost:hover{color:var(--text);border-color:var(--accent-light)}
.tags-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.7rem}
.tags-section{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem;padding-top:0.5rem;border-top:1px dashed var(--border);align-items:center}
.tags-label{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-right:0.2rem}
.tag{padding:0.32rem 0.8rem;border-radius:999px;font-size:0.71rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.tag:hover{color:var(--text);border-color:var(--accent-light)}
.tag.active{background:var(--accent);color:#fff;border-color:transparent;font-weight:600}
.tag-marca{padding:0.28rem 0.7rem;border-radius:6px;font-size:0.68rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.tag-marca:hover{color:var(--text);border-color:var(--accent-light)}
.tag-marca.active{background:var(--accent);color:#fff;border-color:transparent}
.tag-marca[data-marca="INV"].active{background:#c0392b}
.tag-marca[data-marca="GLP"].active{background:#27ae60}
.divider{max-width:1300px;margin:0 auto;padding:0 2rem;border-top:1px solid var(--border);padding-top:1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.count{font-size:0.71rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.count span{color:var(--accent);font-weight:600}
.sync-btn{background:transparent;border:none;color:var(--muted);font-size:0.71rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;transition:color .2s}
.sync-btn:hover{color:var(--accent)}
.sync-btn svg{width:12px;height:12px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.grid{max-width:1300px;margin:0 auto;padding:0 2rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;animation:fadeUp .35s ease both;box-shadow:0 2px 8px rgba(70,105,175,0.05)}
.card:hover{border-color:var(--accent-light);transform:translateY(-3px);box-shadow:0 10px 28px rgba(70,105,175,0.12)}
.card.pinned{border-color:rgba(70,105,175,0.35)}
.card.pinned::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.card.elogio{border-color:rgba(232,160,32,0.4);background:linear-gradient(135deg,#fffdf5,#fff8e8)}
.card.elogio::before{content:'';display:block;height:3px;background:linear-gradient(90deg,#e8a020,#f5c842)}
.card-inner{padding:1rem 1.1rem 0.9rem}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.6rem}
.card-top-left{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
.pill{padding:0.2rem 0.6rem;border-radius:999px;font-size:0.6rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.pill-default{background:rgba(70,105,175,0.1);color:var(--accent)}
.pill-transportes{background:rgba(42,138,175,0.1);color:#2a8aaf}
.pill-campanhas{background:rgba(200,74,122,0.1);color:#c84a7a}
.pill-resultados{background:rgba(42,138,90,0.1);color:#2a8a5a}
.pill-melhorias{background:rgba(90,175,106,0.1);color:#5aaf6a}
.pill-elogios{background:rgba(232,160,32,0.15);color:#b87a10}
.pill-diariobordo{background:rgba(122,90,175,0.1);color:#7a5aaf}
.pill-alinhamentos{background:rgba(122,90,175,0.1);color:#7a5aaf}
.pill-produto{background:rgba(200,122,42,0.1);color:#c87a2a}
.pill-cupons{background:rgba(175,70,105,0.1);color:#af4669}
.pill-grupos{background:rgba(90,122,175,0.1);color:#5a7aaf}
.pill-dicas{background:rgba(74,175,160,0.1);color:#4aafa0}
.pill-inv{background:rgba(192,57,43,0.12);color:#c0392b}
.pill-glp{background:rgba(39,174,96,0.12);color:#1a8a4a}
.pill-glpinv{background:rgba(70,105,175,0.1);color:var(--accent)}
.badge-novo{padding:0.18rem 0.55rem;border-radius:999px;font-size:0.58rem;font-weight:700;background:#c82a2a;color:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.card-title{font-family:'DM Serif Display',serif;font-size:0.97rem;line-height:1.3;color:var(--text);margin-bottom:0.45rem}
.card-excerpt{font-size:0.78rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{padding:0.7rem 1.1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.meta{display:flex;align-items:center;gap:0.4rem}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.52rem;font-weight:700;color:#fff}
.card-author{font-size:0.7rem;color:var(--muted)}
.card-date{font-size:0.68rem;color:var(--muted)}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(26,34,53,0.5);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s;box-shadow:0 20px 50px rgba(26,34,53,0.2)}
.overlay.open .modal{transform:translateY(0)}
.modal-head{padding:1.4rem 1.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:1rem}
.modal-close{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:0.85rem;flex-shrink:0}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.4rem;line-height:1.25;color:var(--text);margin-top:0.6rem}
.modal-body{padding:1.3rem 1.6rem 1.6rem}
.modal-meta{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.av-lg{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff}
.modal-author{font-size:0.82rem;color:var(--text)}
.modal-date{font-size:0.76rem;color:var(--muted);margin-left:auto}
.modal-content{font-size:0.9rem;line-height:1.85;color:#445}
.modal-content p{margin-bottom:0.8rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px}
@media(max-width:600px){.hero,.controls,.divider,.links,.grid{padding-left:1rem;padding-right:1rem}.grid{grid-template-columns:1fr}header{padding:0 1rem}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-text">RBRANDS</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Comunicação D2C</span>
  </div>
  <div class="header-right">
    <div class="notif-wrap" onclick="verNovidades()">
      <div class="notif-icon">🔔</div>
      <div class="notif-count hidden" id="notif-count">0</div>
    </div>
    <span class="badge">Pós-Venda</span>
  </div>
</header>

<div class="notif-banner" id="notif-banner" style="display:none">
  <div class="notif-inner" onclick="verNovidades()">
    <span id="notif-texto">🔔 Você tem publicações novas!</span>
    <button class="notif-close" onclick="event.stopPropagation();document.getElementById('notif-banner').style.display='none'">✕</button>
  </div>
</div>

<div class="hero">
  <p class="hero-label">✦ Pós-Venda · Invictus & Galápagos</p>

  <p class="hero-date" id="hoje"></p>
</div>

<div class="links">
  <a class="link-btn" href="https://www.invictus.com.br/" target="_blank">🌐 Site Invictus</a>
  <a class="link-btn" href="https://galapagosoutdoor.com.br/" target="_blank">🌐 Site Galápagos</a>
</div>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="busca" type="text" placeholder="Buscar publicações..." oninput="render()">
    </div>
    <input class="date-input" id="data-filtro" type="date" onchange="render()">
    <button class="btn-ghost" onclick="limpar()">Limpar</button>
  </div>
  <div class="tags-row">
    <button class="tag active" data-cat="todos" onclick="setcat('todos',this)">🗂️ Todos</button>
    <button class="tag" data-cat="orientacoes" onclick="setcat('orientacoes',this)">📋 Orientações</button>
    <button class="tag" data-cat="resultados" onclick="setcat('resultados',this)">🏆 Resultados</button>
    <button class="tag" data-cat="alinhamentos" onclick="setcat('alinhamentos',this)">🤝 Alinhamentos</button>
    <button class="tag" data-cat="produto" onclick="setcat('produto',this)">🛍️ Produto</button>
    <button class="tag" data-cat="transportes" onclick="setcat('transportes',this)">🚚 Transportes</button>
    <button class="tag" data-cat="campanhas" onclick="setcat('campanhas',this)">📣 Campanhas</button>
    <button class="tag" data-cat="cupons" onclick="setcat('cupons',this)">🎟️ Cupons</button>
    <button class="tag" data-cat="grupos" onclick="setcat('grupos',this)">👥 Grupos Especiais</button>
    <button class="tag" data-cat="dicas" onclick="setcat('dicas',this)">💡 Dicas</button>
    <button class="tag" data-cat="melhorias" onclick="setcat('melhorias',this)">⚙️ Melhorias</button>
    <button class="tag" data-cat="elogios" onclick="setcat('elogios',this)">⭐ Elogios</button>
    <button class="tag" data-cat="nossasagendas" onclick="setcat('nossasagendas',this)">📅 Nossas Agendas</button>
    <button class="tag" data-cat="diariobordo" onclick="setcat('diariobordo',this)">📓 Diário de Bordo</button>
  </div>
  <div class="tags-section">
    <span class="tags-label">Marca:</span>
    <button class="tag-marca active" data-marca="todos" onclick="setmarca('todos',this)">Todas</button>
    <button class="tag-marca" data-marca="INV" onclick="setmarca('INV',this)">INV</button>
    <button class="tag-marca" data-marca="GLP" onclick="setmarca('GLP',this)">GLP</button>
    <button class="tag-marca" data-marca="GLP+INV" onclick="setmarca('GLP+INV',this)">GLP+INV</button>
  </div>
</div>

<div class="divider">
  <p class="count">Exibindo <span id="total">0</span> publicações · <span id="nao-lidas-count" style="color:#c82a2a"></span></p>
  <button class="sync-btn" onclick="carregar()">
    <svg id="sync" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Atualizar
  </button>
</div>

<div class="grid" id="grid"><div class="empty">⏳<p style="margin-top:0.5rem">Carregando publicações...</p></div></div>

<div class="overlay" id="overlay" onclick="fechar(event)">
  <div class="modal">
    <div class="modal-head">
      <div><div id="m-pill"></div><h2 class="modal-title" id="m-titulo"></h2></div>
      <button class="modal-close" onclick="fecharDireto()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="av-lg" id="m-av"></div>
          <span class="modal-author" id="m-autor"></span>
        </div>
        <span class="modal-date" id="m-data"></span>
      </div>
      <div class="modal-content" id="m-corpo"></div>
    </div>
  </div>
</div>

<script>
// Google Visualization API - sem CORS, sem proxy, sem Apps Script!
var SHEET_ID = '1z5_bN9H0y0mRoIZu2eMiU2O0rpOiOn6uk9qrgA-qq5Q';
var SHEET_NAME = '';
var GVZ_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=0';

var MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DIAS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
var CORES = ['#4669AF','#2a8a5a','#7a5aaf','#c87a2a','#2a8aaf','#c84a7a','#e8a020','#c83a2a'];

var CATS = {
  orientacoes:['orientacoes e procedimentos','orientações e procedimentos','orientacao','orientações','orientacoes','procedimentos'],
  resultados:['nossos resultados','resultados','resultado'],
  alinhamentos:['alinhamentos','alinhamento'],
  produto:['produto','produtos'],
  transportes:['transportes','transporte','entrega','entregas','frete'],
  campanhas:['campanhas','campanha'],
  cupons:['cupons','cupom'],
  grupos:['grupos especiais','grupo especial','grupos','grupo'],
  dicas:['dica de atendimentos','dicas de atendimento','dicas','dica'],
  melhorias:['melhorias','melhoria','melhirias','melhiria'],
  elogios:['elogios','elogio'],
  nossasagendas:['nossas agendas','nossa agenda'],
  diariobordo:['diario de bordo','diário de bordo','diario bordo']
};
var PILLCLS = {orientacoes:'pill-default',resultados:'pill-resultados',alinhamentos:'pill-alinhamentos',produto:'pill-produto',transportes:'pill-transportes',campanhas:'pill-campanhas',cupons:'pill-cupons',grupos:'pill-grupos',dicas:'pill-dicas',melhorias:'pill-melhorias',elogios:'pill-elogios',nossasagendas:'pill-default',diariobordo:'pill-diariobordo',outros:'pill-default'};
var PILLLBL = {orientacoes:'📋 Orientações',resultados:'🏆 Resultados',alinhamentos:'🤝 Alinhamentos',produto:'🛍️ Produto',transportes:'🚚 Transportes',campanhas:'📣 Campanhas',cupons:'🎟️ Cupons',grupos:'👥 Grupos',dicas:'💡 Dicas',melhorias:'⚙️ Melhorias',elogios:'⭐ Elogios',nossasagendas:'📅 Nossas Agendas',diariobordo:'📓 Diário de Bordo',outros:'📌 Outros'};

function norm(s){ return (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function normCat(raw) {
  var v = norm(raw);
  var keys = Object.keys(CATS);
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    var ls = CATS[k];
    for (var j=0; j<ls.length; j++) {
      if (norm(ls[j]) === v) return k;
    }
  }
  return 'outros';
}

function normData(val) {
  if (!val) return '';
  var s = String(val).trim();
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // DD/MM/YYYY
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    var y = m[3].length===2 ? '20'+m[3] : m[3];
    return y + '-' + String(m[2]).padStart(2,'0') + '-' + String(m[1]).padStart(2,'0');
  }
  // Google date format: Date(2026,2,3) = March 3, 2026 (month is 0-indexed)
  var gm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (gm) {
    var y2 = gm[1];
    var mo = String(parseInt(gm[2])+1).padStart(2,'0');
    var d2 = String(gm[3]).padStart(2,'0');
    return y2+'-'+mo+'-'+d2;
  }
  try { var dt=new Date(val); if(!isNaN(dt)) return dt.toISOString().split('T')[0]; } catch(e) {}
  return '';
}

function fmt(d) {
  if (!d) return '';
  var p = d.split('-');
  var meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return parseInt(p[2]) + ' ' + meses[parseInt(p[1])-1] + ' ' + p[0];
}
function fmtFull(d) {
  if (!d) return '';
  var p = d.split('-');
  return parseInt(p[2]) + ' de ' + MESES[parseInt(p[1])-1] + ' de ' + p[0];
}
function ini(s) { return ((s||'').split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase()); }

var hoje = new Date();
document.getElementById('hoje').textContent = DIAS[hoje.getDay()] + ', ' + hoje.getDate() + ' de ' + MESES[hoje.getMonth()] + ' de ' + hoje.getFullYear();

function getLidas() { try { return JSON.parse(localStorage.getItem('lidas')||'[]'); } catch(e) { return []; } }
function marcarLida(id) { var l=getLidas(); if(!l.includes(id)){l.push(id);localStorage.setItem('lidas',JSON.stringify(l));} }
function isNovo(dataStr) { if(!dataStr)return false; var diff=(new Date()-new Date(dataStr))/(1000*60*60*24); return diff<=3; }

var posts = [];
var catAtiva = 'todos';
var marcaAtiva = 'todos';

function carregar() {
  var ic = document.getElementById('sync');
  ic.classList.add('spin');
  document.getElementById('grid').innerHTML = '<div class="empty">⏳<p style="margin-top:0.5rem">Carregando publicações...</p></div>';

  var cbName = '_gvzcb' + Date.now();
  var script = document.createElement('script');
  var timer = setTimeout(function() {
    ic.classList.remove('spin');
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    document.getElementById('grid').innerHTML = '<div class="empty">⚠️<p style="margin-top:0.5rem">Tempo esgotado. Verifique se a planilha está publicada na web.</p></div>';
  }, 12000);

  window[cbName] = function(resp) {
    clearTimeout(timer);
    ic.classList.remove('spin');
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);

    try {
      var table = resp.table;
      if (!table || !table.rows || !table.rows.length) {
        document.getElementById('grid').innerHTML = '<div class="empty">📋<p style="margin-top:0.5rem">Planilha sem publicações.</p></div>';
        return;
      }

      // Build headers from cols
      var headers = table.cols.map(function(c){ return c.label || ''; });

      // Build rows
      var rows = table.rows.map(function(row, i) {
        var obj = {};
        headers.forEach(function(h, j) {
          var cell = row.c[j];
          obj[h] = (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v) : '';
        });
        return obj;
      });

      function gk(row) {
        for (var i=1; i<arguments.length; i++) {
          var label = arguments[i];
          var keys = Object.keys(row);
          for (var j=0; j<keys.length; j++) {
            if (norm(keys[j]) === norm(label)) return String(row[keys[j]]||'');
          }
        }
        return '';
      }

      posts = rows.map(function(row, i) {
        var nt = gk(row,'noticias','notícias','noticia','notícia','conteudo','texto');
        var marcaRaw = (gk(row,'marca')||'').trim().toUpperCase().replace(/\s*\+\s*/g,'+');
        return {
          id: i,
          data: normData(gk(row,'data')),
          cat: normCat(gk(row,'categoria')),
          titulo: gk(row,'titulo','título','title'),
          resumo: nt.substring(0,160) + (nt.length>160?'...':''),
          conteudo: nt.replace(/\n/g,'<br>'),
          autor: gk(row,'autor','author') || 'Time',
          pinned: (gk(row,'fixado','pin')||'').toLowerCase().trim()==='sim',
          marca: marcaRaw,
          _cor: CORES[i % CORES.length]
        };
      }).filter(function(p){ return p.titulo; });

      atualizarNotificacoes();
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="empty">⚠️<p style="margin-top:0.5rem">Erro ao processar dados: ' + e.message + '</p></div>';
    }
  };

  script.src = GVZ_URL + '&callback=' + cbName + '&t=' + Date.now();
  script.onerror = function() {
    clearTimeout(timer);
    ic.classList.remove('spin');
    delete window[cbName];
    document.getElementById('grid').innerHTML = '<div class="empty">⚠️<p style="margin-top:0.5rem">Erro ao conectar. Verifique se a planilha está publicada na web.</p></div>';
  };
  document.head.appendChild(script);
}

function atualizarNotificacoes() {
  var lidas = getLidas();
  var novas = posts.filter(function(p){ return isNovo(p.data) && !lidas.includes(p.id); });
  var count = novas.length;
  var nc = document.getElementById('notif-count');
  var nb = document.getElementById('notif-banner');
  if (count > 0) {
    nc.textContent = count;
    nc.classList.remove('hidden');
    document.getElementById('notif-texto').textContent = '🔔 ' + count + ' publicaç' + (count>1?'ões novas':' nova') + ' nos últimos 3 dias';
    nb.style.display = 'block';
  } else {
    nc.classList.add('hidden');
    nb.style.display = 'none';
  }
}

function verNovidades() {
  limpar();
  var lidas = getLidas();
  posts.filter(function(p){ return isNovo(p.data) && !lidas.includes(p.id); }).forEach(function(p){ marcarLida(p.id); });
  document.getElementById('notif-count').classList.add('hidden');
  document.getElementById('notif-banner').style.display = 'none';
  render();
}

function setcat(cat, el) {
  catAtiva = cat;
  document.querySelectorAll('.tag').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  render();
}
function setmarca(m, el) {
  marcaAtiva = m;
  document.querySelectorAll('.tag-marca').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  render();
}
function limpar() {
  catAtiva = 'todos'; marcaAtiva = 'todos';
  document.getElementById('busca').value = '';
  document.getElementById('data-filtro').value = '';
  document.querySelectorAll('.tag').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('.tag[data-cat="todos"]').classList.add('active');
  document.querySelectorAll('.tag-marca').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('.tag-marca[data-marca="todos"]').classList.add('active');
  render();
}

function render() {
  var grid = document.getElementById('grid');
  var q = document.getElementById('busca').value.toLowerCase();
  var dv = document.getElementById('data-filtro').value;
  var lidas = getLidas();

  var f = posts.filter(function(p) {
    var mc = catAtiva==='todos' || p.cat===catAtiva;
    var mm = marcaAtiva==='todos' || p.marca===marcaAtiva;
    var md = !dv || p.data===dv;
    var ms = !q || [p.titulo,p.resumo,p.autor,p.conteudo].some(function(t){ return String(t||'').toLowerCase().includes(q); });
    return mc && mm && md && ms;
  });

  f.sort(function(a,b){ return (b.pinned?1:0)-(a.pinned?1:0) || (b.data||'').localeCompare(a.data||''); });

  var naoLidas = f.filter(function(p){ return !lidas.includes(p.id) && isNovo(p.data); }).length;
  document.getElementById('total').textContent = f.length;
  document.getElementById('nao-lidas-count').textContent = naoLidas > 0 ? (naoLidas + ' não lida' + (naoLidas>1?'s':'')) : '';

  grid.innerHTML = '';
  if (!f.length) {
    grid.innerHTML = '<div class="empty">🔍<p style="margin-top:0.5rem">Nenhuma publicação encontrada.</p></div>';
    return;
  }

  f.forEach(function(p, i) {
    var cls = PILLCLS[p.cat] || 'pill-default';
    var lbl = PILLLBL[p.cat] || '📌 ' + p.cat;
    var isElogio = p.cat === 'elogios';
    var isNovoPub = isNovo(p.data) && !lidas.includes(p.id);
    var marcaPill = '';
    if (p.marca==='INV') marcaPill = '<span class="pill pill-inv">INV</span>';
    else if (p.marca==='GLP') marcaPill = '<span class="pill pill-glp">GLP</span>';
    else if (p.marca==='GLP+INV') marcaPill = '<span class="pill pill-glpinv">GLP+INV</span>';

    var div = document.createElement('div');
    div.className = 'card' + (p.pinned?' pinned':'') + (isElogio?' elogio':'');
    div.style.animationDelay = Math.min(i*0.05,0.4) + 's';
    (function(post){ div.onclick = function(){ abrir(post); }; })(p);
    div.innerHTML = '<div class="card-inner">'
      + '<div class="card-top"><div class="card-top-left"><span class="pill '+cls+'">'+lbl+'</span>'+marcaPill+(isNovoPub?'<span class="badge-novo">NOVO</span>':'')+'</div>'+(p.pinned&&!isElogio?'<span style="color:var(--accent);font-size:.8rem">📌</span>':'')+'</div>'
      + '<h3 class="card-title">'+p.titulo+'</h3>'
      + '<p class="card-excerpt">'+p.resumo+'</p>'
      + '</div>'
      + '<div class="card-footer"><div class="meta"><div class="av" style="background:'+p._cor+'">'+ini(p.autor)+'</div><span class="card-author">'+p.autor+'</span></div><span class="card-date">'+fmt(p.data)+'</span></div>';
    grid.appendChild(div);
  });
}

function abrir(p) {
  marcarLida(p.id);
  var cls = PILLCLS[p.cat] || 'pill-default';
  var lbl = PILLLBL[p.cat] || '📌 ' + p.cat;
  document.getElementById('m-pill').innerHTML = '<span class="pill '+cls+'" style="margin-bottom:0.6rem;display:inline-block">'+lbl+'</span>';
  document.getElementById('m-titulo').textContent = p.titulo;
  document.getElementById('m-av').style.background = p._cor;
  document.getElementById('m-av').textContent = ini(p.autor);
  document.getElementById('m-autor').textContent = p.autor;
  document.getElementById('m-data').textContent = fmtFull(p.data);
  document.getElementById('m-corpo').innerHTML = p.conteudo || '<p>Sem conteúdo.</p>';
  document.getElementById('overlay').classList.add('open');
  atualizarNotificacoes();
  render();
}
function fechar(e) { if(e.target.id==='overlay') fecharDireto(); }
function fecharDireto() { document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') fecharDireto(); });

carregar();
</script>
</body>
</html>
