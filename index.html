<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rbrands · Comunicação D2C</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4fa; --surface:#fff; --surface2:#e8eef8; --border:#d0daea;
  --text:#1a2235; --muted:#6a7a9a; --accent:#4669AF; --accent2:#3558a0; --accent-light:#93B4DE;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 90% -10%,rgba(70,105,175,0.1) 0%,transparent 55%),radial-gradient(ellipse 60% 80% at -10% 90%,rgba(147,180,222,0.07) 0%,transparent 55%);pointer-events:none;z-index:0}

header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 12px rgba(70,105,175,0.07)}
.logo{display:flex;align-items:center;gap:12px}
.logo img{height:28px;filter:brightness(0.15)}
.logo-divider{width:1px;height:24px;background:var(--border)}
.logo-sub{font-size:0.62rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent)}
.badge{font-size:0.63rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:rgba(70,105,175,0.1);padding:0.28rem 0.75rem;border-radius:999px;border:1px solid rgba(70,105,175,0.2)}
.btn-new{background:var(--accent);color:#fff;border:none;padding:0.5rem 1rem;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.76rem;cursor:pointer;display:none;align-items:center;gap:5px;text-decoration:none}
.btn-new:hover{background:var(--accent2)}

.hero{position:relative;z-index:1;padding:3rem 2.5rem 1.5rem;max-width:1300px;margin:0 auto}
.hero-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent-light);margin-bottom:0.6rem;font-weight:500}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);line-height:1.1;color:var(--text)}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-date{margin-top:0.6rem;font-size:0.74rem;color:var(--muted)}

.quick-links{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1.2rem;display:flex;gap:0.6rem;flex-wrap:wrap}
.ql{display:flex;align-items:center;gap:5px;padding:0.38rem 0.85rem;border-radius:8px;font-size:0.73rem;font-weight:500;text-decoration:none;transition:all .2s;border:1.5px solid rgba(70,105,175,0.2);background:rgba(70,105,175,0.05);color:var(--accent)}
.ql:hover{background:rgba(70,105,175,0.1);transform:translateY(-1px)}

.controls{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1.5rem}
.search-row{display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted)}
input[type=text]{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.6rem 1rem 0.6rem 2.3rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.84rem;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(70,105,175,0.1)}
input[type=text]::placeholder{color:var(--muted)}
input[type=date]{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:0.6rem 0.9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.8rem;outline:none;cursor:pointer}
input[type=date]:focus{border-color:var(--accent)}
.btn-clear{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:0.55rem 0.9rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.76rem;cursor:pointer}
.btn-clear:hover{color:var(--text);border-color:var(--accent-light)}

.tags{display:flex;gap:0.35rem;flex-wrap:wrap;margin-top:0.8rem}
.tag{padding:0.3rem 0.8rem;border-radius:999px;font-size:0.7rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.tag:hover{color:var(--text);border-color:var(--accent-light)}
.tag.active{color:#fff;font-weight:600;border-color:transparent;background:var(--accent)}
.tag[data-cat="resultados"].active{background:#2a8a5a}
.tag[data-cat="alinhamentos"].active{background:#7a5aaf}
.tag[data-cat="produto"].active{background:#c87a2a}
.tag[data-cat="transportes"].active{background:#2a8aaf}
.tag[data-cat="campanhas"].active{background:#c84a7a}
.tag[data-cat="cupons"].active{background:#af4669}
.tag[data-cat="grupos"].active{background:#5a7aaf}
.tag[data-cat="dicas"].active{background:#4aafa0}
.tag[data-cat="melhorias"].active{background:#5aaf6a}
.tag[data-cat="elogios"].active{background:#e8a020}
.tag[data-cat="outros"].active{background:#7a8aaa}
.tag[data-cat="urgente"].active{background:#c82a2a}

.bar{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1rem;border-top:1px solid var(--border);padding-top:1.2rem;display:flex;align-items:center;justify-content:space-between}
.count{font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.count span{color:var(--accent);font-weight:600}
.sync{background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;transition:color .2s}
.sync:hover{color:var(--accent)}
.sync svg{width:12px;height:12px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.grid{max-width:1300px;margin:0 auto;padding:0 2.5rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;position:relative;z-index:1}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .22s;animation:up .35s ease both;box-shadow:0 2px 8px rgba(70,105,175,0.04)}
.card:hover{border-color:var(--accent-light);transform:translateY(-3px);box-shadow:0 10px 28px rgba(70,105,175,0.1)}
.card.pinned{border-color:rgba(70,105,175,0.35)}
.card.pinned::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.card.elogio{background:linear-gradient(135deg,#fffdf5,#fff8e8);border-color:rgba(232,160,32,0.35)}
.card.elogio:hover{border-color:rgba(232,160,32,0.6);box-shadow:0 10px 28px rgba(232,160,32,0.12)}
.card.elogio::before{content:'';display:block;height:3px;background:linear-gradient(90deg,#e8a020,#f5c842)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.ch{padding:0.9rem 1.1rem 0.5rem;display:flex;align-items:flex-start;justify-content:space-between}
.pill{padding:0.2rem 0.6rem;border-radius:999px;font-size:0.6rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.cb{padding:0 1.1rem 0.8rem}
.ct{font-family:'DM Serif Display',serif;font-size:0.96rem;line-height:1.3;color:var(--text);margin-bottom:0.4rem}
.cx{font-size:0.77rem;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cf{padding:0.7rem 1.1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.52rem;font-weight:700;color:#fff;flex-shrink:0}
.ca{font-size:0.7rem;color:var(--muted);margin-left:0.4rem}
.cd{font-size:0.68rem;color:var(--muted)}

.empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty div{font-size:2rem;margin-bottom:0.6rem;opacity:.35}

.overlay{position:fixed;inset:0;background:rgba(26,34,53,0.45);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform .22s;box-shadow:0 20px 50px rgba(26,34,53,0.18)}
.overlay.open .modal{transform:translateY(0)}
.mt{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.mc{background:none;border:1.5px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:0.85rem;flex-shrink:0;transition:all .2s}
.mc:hover{color:var(--text)}
.mb{padding:1.2rem 1.5rem 1.5rem}
.mm{display:flex;align-items:center;gap:0.9rem;margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.av2{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff}
.mn{font-size:0.8rem;color:var(--text)}
.md{font-size:0.74rem;color:var(--muted);margin-left:auto}
.mx{font-size:0.89rem;line-height:1.8;color:#445}
.mx p{margin-bottom:0.9rem}

.banner{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 2.5rem 1rem}
.bn{background:rgba(70,105,175,0.06);border:1px solid rgba(70,105,175,0.18);border-radius:10px;padding:0.8rem 1.1rem;display:flex;align-items:center;gap:0.8rem;font-size:0.78rem;color:var(--accent)}
.bn button{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem}

@media(max-width:600px){
  header,.hero,.controls,.bar,.banner,.quick-links{padding-left:1rem;padding-right:1rem}
  .grid{padding:0 1rem 3rem;grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCABEATQDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAj/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/AIyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB//9k=" alt="Rbrands">

<script>
const SHEET_ID = "1z5_bN9H0y0mRoIZu2eMiU2O0rpOiOn6uk9qrgA-qq5Q";
const FORM_URL  = "";
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS   = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const COLORS = ['#4669AF','#2a8a5a','#7a5aaf','#c87a2a','#2a8aaf','#c84a7a','#e8a020','#c83a2a'];

const CAT_CFG = {
  orientacoes:{l:'📋 Orientações',bg:'rgba(70,105,175,0.12)',cl:'#4669AF'},
  resultados: {l:'🏆 Resultados',  bg:'rgba(42,138,90,0.12)', cl:'#2a8a5a'},
  alinhamentos:{l:'🤝 Alinhamentos',bg:'rgba(122,90,175,0.12)',cl:'#7a5aaf'},
  produto:    {l:'🛍️ Produto',     bg:'rgba(200,122,42,0.12)',cl:'#c87a2a'},
  transportes:{l:'🚚 Transportes', bg:'rgba(42,138,175,0.12)',cl:'#2a8aaf'},
  campanhas:  {l:'📣 Campanhas',   bg:'rgba(200,74,122,0.12)',cl:'#c84a7a'},
  cupons:     {l:'🎟️ Cupons',      bg:'rgba(175,70,105,0.12)',cl:'#af4669'},
  grupos:     {l:'👥 Grupos Esp.', bg:'rgba(90,122,175,0.12)',cl:'#5a7aaf'},
  dicas:      {l:'💡 Dicas',       bg:'rgba(74,175,160,0.12)',cl:'#4aafa0'},
  melhorias:  {l:'⚙️ Melhorias',   bg:'rgba(90,175,106,0.12)',cl:'#5aaf6a'},
  elogios:    {l:'⭐ Elogios',     bg:'rgba(232,160,32,0.15)',cl:'#b87a10'},
  outros:     {l:'📌 Outros',      bg:'rgba(122,138,170,0.12)',cl:'#7a8aaa'},
  urgente:    {l:'🚨 Urgente',     bg:'rgba(200,42,42,0.12)', cl:'#c82a2a'},
};

const NORM_CAT = {
  'orientacoes e procedimentos':'orientacoes','orientacoes':'orientacoes','procedimentos':'orientacoes',
  'nossos resultados':'resultados','resultados':'resultados','resultado':'resultados',
  'alinhamentos':'alinhamentos','alinhamento':'alinhamentos',
  'produto':'produto','produtos':'produto',
  'transportes':'transportes','transporte':'transportes','entrega':'transportes','entregas':'transportes',
  'campanhas':'campanhas','campanha':'campanhas',
  'cupons':'cupons','cupom':'cupons',
  'grupos especiais':'grupos','grupos':'grupos','grupo':'grupos',
  'dica de atendimentos':'dicas','dicas de atendimento':'dicas','dicas':'dicas','dica':'dicas',
  'melhorias':'melhorias','melhoria':'melhorias',
  'elogios':'elogios','elogio':'elogios',
  'urgente':'urgente',
  'outros':'outros','outro':'outros','geral':'outros','sistemas':'outros','sistema':'outros',
};

function normCat(s){
  const n=(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return NORM_CAT[n]||'outros';
}
function getCfg(cat){ return CAT_CFG[cat]||{l:'📌 '+cat,bg:'rgba(70,105,175,0.08)',cl:'#4669AF'}; }
function ini(n){ return (n||'?').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase(); }

function fmtDate(v){
  if(!v)return '';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const dm=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(dm)return `${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;
  const ms={jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
  const pm=s.toLowerCase().match(/^(\d{1,2})[\/\-]([a-z]{3})(?:[\/\-](\d{2,4}))?$/);
  if(pm){const y=pm[3]?(pm[3].length===2?'20'+pm[3]:pm[3]):new Date().getFullYear();return `${y}-${String(ms[pm[2]]||1).padStart(2,'0')}-${String(pm[1]).padStart(2,'0')}`;}
  const dmy=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(dmy)return `${dmy[3].length===2?'20'+dmy[3]:dmy[3]}-${String(dmy[2]).padStart(2,'0')}-${String(dmy[1]).padStart(2,'0')}`;
  try{return new Date(v).toISOString().split('T')[0];}catch{return '';}
}
function fmt(d){if(!d)return '';const[y,m,dd]=d.split('-');return `${+dd} ${['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][+m-1]} ${y}`;}
function fmtFull(d){if(!d)return '';const[y,m,dd]=d.split('-');return `${+dd} de ${MONTHS[+m-1]} de ${y}`;}

const t=new Date();
document.getElementById('today').textContent=`${DAYS[t.getDay()]}, ${t.getDate()} de ${MONTHS[t.getMonth()]} de ${t.getFullYear()}`;
if(FORM_URL){const b=document.getElementById('btn-new');b.href=FORM_URL;b.style.display='flex';}

document.getElementById('q').oninput=render;
document.getElementById('dt').onchange=render;
document.getElementById('tags').onclick=e=>{
  const tg=e.target.closest('.tag');
  if(!tg)return;
  document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
  tg.classList.add('active');
  render();
};
function clearF(){
  document.getElementById('q').value='';
  document.getElementById('dt').value='';
  document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
  document.querySelector('.tag[data-cat="todos"]').classList.add('active');
  render();
}

let posts=[];

function load(){
  const si=document.getElementById('si');
  si.classList.add('spin');

  const cb='_gcb'+Date.now();
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&callback=${cb}`;

  const timer=setTimeout(()=>{
    si.classList.remove('spin');
    setBanner('Não foi possível conectar à planilha. Verifique se ela está compartilhada como pública.');
    delete window[cb];
  },10000);

  window[cb]=function(data){
    clearTimeout(timer);
    si.classList.remove('spin');
    delete window[cb];
    try{
      const rows=data.table?.rows||[];
      const cols=data.table?.cols||[];
      if(!rows.length){setBanner('Planilha vazia — adicione publicações!');render();return;}
      const idx={};
      cols.forEach((c,i)=>{if(c.label)idx[c.label.toLowerCase().trim()]=i;});
      const nr=s=>(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const gi=(...ls)=>{for(const l of ls){const k=Object.keys(idx).find(k=>nr(k)===nr(l));if(k!==undefined)return idx[k];}return -1;};
      const iD=gi('data'),iC=gi('categoria'),iT=gi('titulo','título','title');
      const iN=gi('noticia','notícia','conteudo','conteúdo','texto','mensagem','news');
      const iR=gi('resumo'),iA=gi('autor','author'),iF=gi('fixado','pin','pinned');
      const gv=(row,i)=>i>=0&&row.c[i]?.v!=null?String(row.c[i].v):'';
      posts=rows.map((row,i)=>{
        const n=gv(row,iN);
        return{id:i,data:fmtDate(gv(row,iD)),cat:normCat(gv(row,iC)),titulo:gv(row,iT),
          resumo:gv(row,iR)||n.substring(0,160)+(n.length>160?'...':''),
          conteudo:n.replace(/\n/g,'<br>'),autor:gv(row,iA)||'Time',
          pinned:gv(row,iF).toLowerCase()==='sim',_c:COLORS[i%COLORS.length]};
      }).filter(p=>p.titulo);
      document.getElementById('banner').style.display='none';
    }catch(e){console.error(e);setBanner('Erro ao processar a planilha.');}
    render();
  };

  const s=document.createElement('script');
  s.src=url;
  s.onerror=()=>{clearTimeout(timer);si.classList.remove('spin');setBanner('Erro ao carregar planilha.');delete window[cb];};
  document.head.appendChild(s);
}

function setBanner(msg){
  const b=document.getElementById('banner');
  const t=document.getElementById('banner-txt');
  if(b&&t){b.style.display='flex';t.textContent=msg;}
}

function render(){
  const grid=document.getElementById('grid');
  const q=document.getElementById('q').value.toLowerCase();
  const dv=document.getElementById('dt').value;
  const ac=document.querySelector('.tag.active')?.dataset.cat||'todos';
  let f=posts.filter(p=>{
    const mc=ac==='todos'||p.cat===ac;
    const md=!dv||p.data===dv;
    const ms=!q||[p.titulo,p.resumo,p.autor,p.conteudo].some(x=>String(x).toLowerCase().includes(q));
    return mc&&md&&ms;
  });
  f.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.data||'').localeCompare(a.data||''));
  document.getElementById('cnt').textContent=f.length;
  grid.innerHTML='';
  if(!f.length){grid.innerHTML='<div class="empty"><div>🔍</div><p>Nenhuma publicação encontrada.</p></div>';return;}
  f.forEach((p,i)=>{
    const cfg=getCfg(p.cat);
    const isEl=p.cat==='elogios';
    const card=document.createElement('div');
    card.className='card'+(p.pinned?' pinned':'')+(isEl?' elogio':'');
    card.style.animationDelay=Math.min(i*.05,.4)+'s';
    card.onclick=()=>openM(p);
    card.innerHTML=`
      <div class="ch"><span class="pill" style="background:${cfg.bg};color:${cfg.cl}">${cfg.l}</span>${p.pinned&&!isEl?'<span style="color:var(--accent);font-size:.8rem">📌</span>':''}</div>
      <div class="cb"><h3 class="ct">${p.titulo}</h3><p class="cx">${p.resumo}</p></div>
      <div class="cf"><div style="display:flex;align-items:center"><div class="av" style="background:${p._c}">${ini(p.autor)}</div><span class="ca">${p.autor}</span></div><span class="cd">${fmt(p.data)}</span></div>`;
    grid.appendChild(card);
  });
}

function openM(p){
  const cfg=getCfg(p.cat);
  document.getElementById('mpill').innerHTML=`<span class="pill" style="background:${cfg.bg};color:${cfg.cl}">${cfg.l}</span>`;
  document.getElementById('mtit').textContent=p.titulo;
  const av=document.getElementById('mav');av.style.background=p._c;av.textContent=ini(p.autor);
  document.getElementById('maut').textContent=p.autor;
  document.getElementById('mdat').textContent=fmtFull(p.data);
  document.getElementById('mcont').innerHTML=p.conteudo||'<p>Sem conteúdo.</p>';
  document.getElementById('ov').classList.add('open');
}
function closeM(e){if(e.target.id==='ov')document.getElementById('ov').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('ov').classList.remove('open');});

load();
</script>
</body>
</html>
