<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rbrands · Portal de Comunicação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── CONFIGURAÇÃO FÁCIL ─────────────────────────────────
     Altere apenas estas variáveis para personalizar o portal
  ──────────────────────────────────────────────────────── */
  :root {
    --nome-empresa: "Rbrands";
    --bg: #f4f2ee;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --text: #1a1714;
    --muted: #8a8480;
    --accent: #b8892a;
    --accent2: #9a7020;
    --cat-entrega: #2a8a76;
    --cat-comercial: #5a4ec8;
    --cat-resultado: #c85a2a;
    --cat-rh: #c83a6a;
    --cat-produto: #2a6ec8;
    --cat-operacoes: #4a8a1a;
    --cat-urgente: #c82a2a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(184,137,42,0.06) 0%, transparent 60%), radial-gradient(ellipse 40% 60% at 10% 80%, rgba(42,138,118,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 100; background: rgba(244,242,238,0.96); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(184,137,42,0.3); }
  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-brand { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--accent); letter-spacing: 0.02em; }
  .logo-sub { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 0.8rem; }
  .btn-primary { background: var(--accent); color: #ffffff; border: none; padding: 0.55rem 1.1rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; text-decoration: none; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 0.9rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; text-decoration: none; }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  /* HERO */
  .hero { position: relative; z-index: 1; padding: 3.5rem 2.5rem 2.5rem; max-width: 1300px; margin: 0 auto; }
  .hero-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.8rem; }
  .hero-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.1; color: var(--text); max-width: 600px; }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-date { margin-top: 1rem; font-size: 0.78rem; color: var(--muted); }

  /* CONTROLES */
  .controls { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 2.5rem 2rem; }
  .search-row { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--muted); }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.68rem 1rem 0.68rem 2.5rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.87rem; outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .date-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.68rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.84rem; outline: none; transition: border-color 0.2s; min-width: 148px; cursor: pointer; }
  .date-input:focus { border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); cursor: pointer; }

  .filter-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.9rem; }
  .tag { padding: 0.38rem 0.9rem; border-radius: 999px; font-size: 0.74rem; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; border: 1.5px solid var(--border); transition: all 0.2s; background: var(--surface); color: var(--muted); }
  .tag:hover { color: var(--text); border-color: #444; }
  .tag.active { color: #0f0f0f; font-weight: 600; }
  .tag[data-cat="todos"].active { background: var(--accent); border-color: var(--accent); }
  .tag[data-cat="entrega"].active { background: var(--cat-entrega); border-color: var(--cat-entrega); }
  .tag[data-cat="comercial"].active { background: var(--cat-comercial); border-color: var(--cat-comercial); }
  .tag[data-cat="resultado"].active { background: var(--cat-resultado); border-color: var(--cat-resultado); }
  .tag[data-cat="rh"].active { background: var(--cat-rh); border-color: var(--cat-rh); }
  .tag[data-cat="produto"].active { background: var(--cat-produto); border-color: var(--cat-produto); }
  .tag[data-cat="operacoes"].active { background: var(--cat-operacoes); border-color: var(--cat-operacoes); color: #0f0f0f; }
  .tag[data-cat="urgente"].active { background: var(--cat-urgente); border-color: var(--cat-urgente); }

  /* DIVISOR */
  .section-divider { max-width: 1300px; margin: 0 auto; padding: 0 2.5rem; border-top: 1px solid var(--border); padding-top: 1.8rem; position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .results-info { font-size: 0.74rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .results-info span { color: var(--accent); }
  .sync-btn { background: transparent; border: none; color: var(--muted); font-size: 0.74rem; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0; transition: color 0.2s; font-family: 'DM Sans', sans-serif; }
  .sync-btn:hover { color: var(--text); }
  .sync-btn svg { width: 13px; height: 13px; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GRID */
  .grid { max-width: 1300px; margin: 0 auto; padding: 0 2.5rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.1rem; position: relative; z-index: 1; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.25s; position: relative; animation: fadeUp 0.4s ease both; }
  .card:hover { border-color: #3a3a3a; transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
  .card.pinned { border-color: rgba(232,201,122,0.3); }
  .card.pinned::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
  .card-header { padding: 1.1rem 1.3rem 0.7rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.8rem; }
  .cat-pill { padding: 0.22rem 0.65rem; border-radius: 999px; font-size: 0.63rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; }
  .cat-entrega { background: rgba(74,158,138,0.15); color: var(--cat-entrega); }
  .cat-comercial { background: rgba(123,110,232,0.15); color: var(--cat-comercial); }
  .cat-resultado { background: rgba(232,115,74,0.15); color: var(--cat-resultado); }
  .cat-rh { background: rgba(232,92,138,0.15); color: var(--cat-rh); }
  .cat-produto { background: rgba(74,142,232,0.15); color: var(--cat-produto); }
  .cat-operacoes { background: rgba(138,232,74,0.12); color: var(--cat-operacoes); }
  .cat-urgente { background: rgba(232,74,74,0.15); color: var(--cat-urgente); }
  .pin-icon { color: var(--accent); opacity: 0.8; font-size: 0.9rem; flex-shrink: 0; }
  .card-body { padding: 0 1.3rem 1.1rem; }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.02rem; line-height: 1.3; color: var(--text); margin-bottom: 0.55rem; }
  .card-excerpt { font-size: 0.81rem; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { padding: 0.85rem 1.3rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-meta { display: flex; align-items: center; gap: 0.5rem; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.58rem; font-weight: 700; }
  .card-author { font-size: 0.74rem; color: var(--muted); }
  .card-date { font-size: 0.71rem; color: var(--muted); }

  /* EMPTY / LOADING */
  .empty { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-text { font-size: 0.88rem; line-height: 1.7; }
  .empty-text a { color: var(--accent); }

  /* MODAL LEITURA */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 700px; width: 100%; max-height: 88vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-top { padding: 1.8rem 1.8rem 1.3rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; transition: all 0.2s; }
  .modal-close:hover { color: var(--text); border-color: #444; }
  .modal-cat { margin-bottom: 0.75rem; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1.25; color: var(--text); }
  .modal-body { padding: 1.4rem 1.8rem 1.8rem; }
  .modal-meta-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.4rem; padding-bottom: 1.4rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .modal-author-row { display: flex; align-items: center; gap: 0.5rem; }
  .avatar-lg { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; }
  .modal-author-name { font-size: 0.84rem; color: var(--text); }
  .modal-date-full { font-size: 0.78rem; color: var(--muted); margin-left: auto; }
  .modal-content { font-size: 0.91rem; line-height: 1.85; color: #444; }
  .modal-content p { margin-bottom: 1rem; }
  .modal-content strong { color: var(--text); }

  /* BANNER CONFIG */
  .config-banner { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto 0; padding: 0 2.5rem; }
  .banner { background: rgba(232,201,122,0.08); border: 1px solid rgba(232,201,122,0.2); border-radius: 10px; padding: 1rem 1.3rem; display: flex; align-items: flex-start; gap: 0.9rem; margin-bottom: 1.5rem; }
  .banner svg { flex-shrink: 0; width: 18px; height: 18px; color: var(--accent); margin-top: 1px; }
  .banner-text { font-size: 0.82rem; line-height: 1.6; color: #c9b87a; }
  .banner-text strong { color: var(--accent); }
  .banner-text a { color: var(--accent); }
  .banner-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; flex-shrink: 0; padding: 0; line-height: 1; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .hero, .controls, .section-divider, .config-banner { padding-left: 1rem; padding-right: 1rem; }
    .grid { padding: 0 1rem 3rem; grid-template-columns: 1fr; }
    .logo-sub { display: none; }
  }
</style>
</head>

function getCat(key) {

  return CAT[k] || { label: '📌 ' + (key||'Geral'), cls: 'cat-produto' };

// PARSE CSV
// ════════════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  
  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }

  const headers = splitCSVLine(lines[0]).map(h =>
    h.replace(/^"|"$/g,'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  );

  const norm = s => (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const getIdx = (...labels) => {
    for (const l of labels) { const i = headers.indexOf(norm(l)); if (i>=0) return i; }
    return -1;
  };

  const iData     = getIdx('data');
  const iCat      = getIdx('categoria');
  const iTitulo   = getIdx('titulo','title');
  const iNoticia  = getIdx('noticia','conteudo','texto','mensagem','news');
  const iResumo   = getIdx('resumo');
  const iAutor    = getIdx('autor','author');
  const iFixado   = getIdx('fixado','pin','pinned');

  return lines.slice(1).map((line, i) => {
    const cols = splitCSVLine(line).map(c => c.replace(/^"|"$/g,'').trim());
    const get  = idx => idx >= 0 ? (cols[idx] || '') : '';
    const noticia = get(iNoticia);
    const resumo  = get(iResumo) || noticia.substring(0, 160) + (noticia.length > 160 ? '...' : '');
    return {
      id: i,
      data:     formatISODate(get(iData)),
      cat:      (get(iCat) || 'geral').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,''),
      titulo:   get(iTitulo),
      resumo,
      conteudo: noticia.replace(/\n/g,'<br>'),
      autor:    get(iAutor) || 'Time',
      pinned:   get(iFixado).toLowerCase().trim() === 'sim',
      _color:   AVATAR_COLORS[i % AVATAR_COLORS.length],
    };
  }).filter(p => p.titulo);
}

// ════════════════════════════════════════════════════════════
// BUSCAR DADOS DO GOOGLE SHEETS
// ════════════════════════════════════════════════════════════
async function loadPosts() {
  setSyncLoading(true);

  const hasCSV  = CSV_URL  && CSV_URL  !== 'COLE_O_LINK_CSV_AQUI';
  const hasSheet = SHEET_ID && SHEET_ID !== 'COLE_SEU_ID_AQUI';

  if (!hasCSV && !hasSheet) {
    posts = DEMO_POSTS.map((p,i) => ({ ...p, id: i, _color: AVATAR_COLORS[i % AVATAR_COLORS.length] }));
    usingDemo = true;
    setSyncLoading(false);
    render();
    return;
  }

  // Usar CSV direto se disponível (mais simples)
  if (hasCSV) {
    try {
      const res  = await fetch(CSV_URL);
      const text = await res.text();
      posts = parseCSV(text);
      usingDemo = false;
      document.getElementById('config-banner').style.display = 'none';
    } catch(e) {
      console.warn('Erro CSV, usando demo:', e);
      posts = DEMO_POSTS.map((p,i) => ({ ...p, id: i, _color: AVATAR_COLORS[i % AVATAR_COLORS.length] }));
      usingDemo = true;
    }
    setSyncLoading(false);
    render();
    return;
  }

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res  = await fetch(url);
    const text = await res.text();

    const jsonStr = text.match(/setResponse\(([\s\S]*)\)/)?.[1];
    if (!jsonStr) throw new Error('Formato inesperado');

    const data = JSON.parse(jsonStr);
    const rows = data.table?.rows || [];
    const cols = data.table?.cols || [];

    const idx = {};
    cols.forEach((c, i) => { idx[c.label?.toLowerCase().trim()] = i; });

    posts = rows.map((row, i) => {
      // Busca flexível: aceita nomes de coluna com ou sem acento, maiúsculo ou minúsculo
      const get = (...labels) => {
        for (const label of labels) {
          const key = Object.keys(idx).find(k =>
            k.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'') ===
            label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
          );
          if (key !== undefined && row.c[idx[key]]?.v != null) return String(row.c[idx[key]]?.f ?? row.c[idx[key]]?.v);
        }
        return '';
      };

      const noticia = get('noticia', 'notícia', 'conteudo', 'conteúdo', 'texto', 'mensagem');
      const resumo  = get('resumo') || noticia.substring(0, 160) + (noticia.length > 160 ? '...' : '');

      return {
        id: i,
        data:     formatISODate(get('data')),
        cat:      (get('categoria') || 'geral').toLowerCase().trim(),
        titulo:   get('titulo', 'título') || '',
        resumo,
        conteudo: noticia.replace(/\n/g, '<br>'),
        autor:    get('autor') || 'Time',
        pinned:   get('fixado').toLowerCase().trim() === 'sim',
        _color:   AVATAR_COLORS[i % AVATAR_COLORS.length],
      };
    }).filter(p => p.titulo);

    usingDemo = false;
    document.getElementById('config-banner').style.display = 'none';
  } catch (e) {
    console.warn('Erro ao buscar planilha, usando demo:', e);
    posts = DEMO_POSTS.map((p,i) => ({ ...p, id: i, _color: AVATAR_COLORS[i % AVATAR_COLORS.length] }));
    usingDemo = true;
  }

  setSyncLoading(false);
  render();
}

function formatISODate(val) {
  if (!val) return new Date().toISOString().split('T')[0];
  const s = String(val).trim();
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  // Google Sheets: Date(year,month,day)
  const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) {
    const y=dm[1], mo=String(parseInt(dm[2])+1).padStart(2,'0'), d=String(dm[3]).padStart(2,'0');
    return `${y}-${mo}-${d}`;
  }
  // Formato "12/mar" ou "12/mar/2025"
  const meses={jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
  const ptm=s.toLowerCase().match(/^(\d{1,2})[\/\-]([a-z]{3})(?:[\/\-](\d{2,4}))?$/);
  if (ptm) {
    const day=String(ptm[1]).padStart(2,'0');
    const mo=String(meses[ptm[2]]||1).padStart(2,'0');
    const year=ptm[3]?(ptm[3].length===2?'20'+ptm[3]:ptm[3]):new Date().getFullYear();
    return `${year}-${mo}-${day}`;
  }
  // dd/mm/yyyy
  const dmy=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (dmy) {
    const day=String(dmy[1]).padStart(2,'0'), mo=String(dmy[2]).padStart(2,'0');
    const year=dmy[3].length===2?'20'+dmy[3]:dmy[3];
    return `${year}-${mo}-${day}`;
  }
  try { return new Date(val).toISOString().split('T')[0]; } catch { return ''; }
}

function setSyncLoading(loading) {
  const icon = document.getElementById('sync-icon');
  icon.classList.toggle('spin', loading);
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterCards() { render(); }

function clearFilters() {
  activeCategory = 'todos';
  document.getElementById('search-input').value = '';
  document.getElementById('date-input').value   = '';
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  document.querySelector('.tag[data-cat="todos"]').classList.add('active');
  render();
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function fmt(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const ms = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${parseInt(day)} ${ms[parseInt(m)-1]} ${y}`;
}
function fmtFull(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} de ${MONTHS[parseInt(m)-1]} de ${y}`;
}
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
}

function render() {
  const grid = document.getElementById('card-grid');
  const q    = document.getElementById('search-input').value.toLowerCase();
  const date = document.getElementById('date-input').value;

  let filtered = posts.filter(p => {
    const matchCat    = activeCategory === 'todos' || p.cat === activeCategory;
    const matchDate   = !date || p.data === date;
    const matchSearch = !q || [p.titulo, p.resumo, p.autor, p.conteudo].some(t =>
      String(t).toLowerCase().includes(q));
    return matchCat && matchDate && matchSearch;
  });

  // Fixados primeiro, depois por data
  filtered.sort((a,b) => {
    if (b.pinned !== a.pinned) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    return (b.data || '').localeCompare(a.data || '');
  });

  document.getElementById('count').textContent = filtered.length;
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <p class="empty-text">Nenhuma publicação encontrada.<br>Tente outros filtros ou <a href="javascript:void(0)" onclick="clearFilters()">limpar a busca</a>.</p>
    </div>`;
    return;
  }

  filtered.forEach((p, i) => {
    const cfg  = getCat(p.cat);
    const ini  = initials(p.autor);
    const col  = p._color || AVATAR_COLORS[0];
    const card = document.createElement('div');
    card.className = 'card' + (p.pinned ? ' pinned' : '');
    card.style.animationDelay = Math.min(i * 0.05, 0.4) + 's';
    card.onclick = () => openRead(p);
    card.innerHTML = `
      <div class="card-header">
        <span class="cat-pill ${cfg.cls}">${cfg.label}</span>
        ${p.pinned ? '<span class="pin-icon">📌</span>' : ''}
      </div>
      <div class="card-body">
        <h3 class="card-title">${p.titulo}</h3>
        <p class="card-excerpt">${p.resumo || p.conteudo.replace(/<[^>]+>/g,'').substring(0,180)}</p>
      </div>
      <div class="card-footer">
        <div class="card-meta">
          <div class="avatar" style="background:${col}22;color:${col}">${ini}</div>
          <span class="card-author">${p.autor}</span>
        </div>
        <span class="card-date">${fmt(p.data)}</span>
      </div>`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════════
function openRead(p) {
  const cfg = getCat(p.cat);
  const col = p._color || AVATAR_COLORS[0];
  document.getElementById('modal-cat').innerHTML   = `<span class="cat-pill ${cfg.cls}">${cfg.label}</span>`;
  document.getElementById('modal-title').textContent = p.titulo;
  document.getElementById('modal-avatar').style.cssText = `background:${col}22;color:${col}`;
  document.getElementById('modal-avatar').textContent   = initials(p.autor);
  document.getElementById('modal-author').textContent   = p.autor;
  document.getElementById('modal-date').textContent     = fmtFull(p.data);
  document.getElementById('modal-content').innerHTML    = p.conteudo || '<p>Sem conteúdo.</p>';
  document.getElementById('read-overlay').classList.add('open');
}
function closeRead(e) { if (e.target.id === 'read-overlay') closeReadDirect(); }
function closeReadDirect() { document.getElementById('read-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadDirect(); });
